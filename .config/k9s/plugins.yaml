---
plugins:
  #--- Create debug container for selected pod in current namespace
  # See https://kubernetes.io/docs/tasks/debug/debug-application/debug-running-pod/#ephemeral-container
  debug:
    shortCut: Shift-D
    description: Add debug container
    dangerous: true
    scopes:
      - containers
    command: bash
    background: false
    confirm: true
    args:
      - -c
      - "kubectl debug -it --context $CONTEXT -n=$NAMESPACE $POD --target=$NAME --image=nicolaka/netshoot:v0.15 --profile=sysadmin --share-processes -- bash"
  deleteContext:
    shortCut: Ctrl-D
    confirm: true
    description: Delete kubectl context
    scopes:
      - contexts
    command: kubectl
    background: true
    args:
      - config
      - delete-context
      - $COL-NAME
  setDefaultContext:
    shortCut: Shift-P
    confirm: true
    description: Set default kubectl context
    scopes:
      - contexts
    command: kubectl
    background: true
    args:
      - config
      - use-context
      - $NAME
